name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Cache
        uses: actions/cache@v3
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev libxml2-dev libxslt1-dev ccache
          pip install --upgrade buildozer cython setuptools wheel
      
      - name: Setup Android SDK (fix AIDL issue)
        run: |
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          if [ ! -d "$ANDROID_HOME" ]; then
            mkdir -p $ANDROID_HOME
            cd $ANDROID_HOME
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q commandlinetools-linux-11076708_latest.zip
            mkdir -p latest
            mv cmdline-tools/* latest/
            mv latest cmdline-tools/
            export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34"
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;34.0.0"
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "ndk;25.2.9519653"
          fi
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
      
      - name: Build APK
        run: buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./bin/*.apk
