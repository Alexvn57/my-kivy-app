name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Cache
        uses: actions/cache@v3
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev libxml2-dev libxslt1-dev ccache
          pip install --upgrade buildozer cython setuptools wheel
      
      - name: Pre-seed Android SDK
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk
          cd ~/.buildozer/android/platform/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          
          mkdir -p tools/bin
          cat > tools/bin/sdkmanager << 'EOF'
          #!/bin/bash
          SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_ROOT" "$@"
          EOF
          chmod +x tools/bin/sdkmanager
          
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          
          yes | cmdline-tools/latest/bin/sdkmanager --sdk_root=$PWD "platforms;android-34"
          yes | cmdline-tools/latest/bin/sdkmanager --sdk_root=$PWD "build-tools;34.0.0"
          yes | cmdline-tools/latest/bin/sdkmanager --sdk_root=$PWD "ndk;25.2.9519653"
      
      - name: Fix NDK environment
        run: |
          unset ANDROID_NDK
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_LATEST_HOME
          unset ANDROID_SDK_ROOT
          
          echo "ANDROIDNDK=/home/runner/.buildozer/android/platform/android-ndk-r25c" >> $GITHUB_ENV
          echo "ANDROIDSDK=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROIDAPI=34" >> $GITHUB_ENV
          echo "ANDROIDMINAPI=21" >> $GITHUB_ENV
      
      - name: Build APK
        run: buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./bin/*.apk
